<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<title>십삼월</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FFFFFF;--bg2:#F2F4F6;--text:#191F28;--text2:#4E5968;--text3:#8B95A1;--text4:#B0B8C1;
  --blue:#3182F6;--blue-bg:#E8F3FF;--red:#F04452;--green:#00C853;
  --line:#F2F4F6;--input-line:#E5E8EB;--pad:24px;--radius:16px;
}
body{
  font-family:'Pretendard Variable',-apple-system,system-ui,sans-serif;
  background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
  max-width:440px;margin:0 auto;min-height:100vh;min-height:-webkit-fill-available;
  overflow-x:hidden;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex;animation:screenIn .4s cubic-bezier(.16,1,.3,1)}
@keyframes screenIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes staggerIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes fillBar{from{width:0}}
@keyframes springIn{0%{opacity:0;transform:scale(.9) translateY(12px)}60%{transform:scale(1.02) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}

/* APP NAME */
.app-name{display:none}

/* INPUT */
.input-screen{flex:1;display:flex;flex-direction:column;padding:0 var(--pad)}
.step-bar{display:flex;flex-direction:column;align-items:center;padding-top:20px;padding-bottom:16px}
.step-dots{display:flex;align-items:center;gap:0}
.step-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:inherit;color:var(--text4);background:var(--line);transition:all .3s}
.step-num.active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(49,130,246,.3)}
.step-num.done{background:var(--blue);color:#fff}
.step-line{width:28px;height:2px;background:var(--line);transition:background .3s}
.step-line.active{background:var(--blue)}
.step-line.done{background:var(--blue)}
.step-label{font-size:14px;font-weight:600;color:var(--blue);margin-top:10px}
.input-top{padding-top:16px}
.input-title{font-size:22px;font-weight:700;letter-spacing:-.4px;line-height:1.45}
.input-sub{font-size:14px;color:var(--text3);margin-top:8px;margin-bottom:32px}
.salary-section{display:flex;flex-direction:column}
.salary-wrap{display:flex;align-items:baseline;gap:16px;width:100%}
.salary-input{
  width:0;flex:1;font-size:36px;font-weight:800;letter-spacing:-2px;
  border:none;border-bottom:3px solid #DDE0E4;outline:none;
  padding:8px 0;background:transparent;color:var(--text);
  font-family:inherit;caret-color:var(--blue);text-align:right;
  transition:border-color .2s;
}
.salary-input:focus{border-bottom-color:var(--blue)}
.salary-input::placeholder{color:var(--text4);font-size:22px;font-weight:400}
.salary-unit{font-size:18px;font-weight:600;color:var(--text3);white-space:nowrap;flex-shrink:0}
.salary-hint{font-size:14px;color:var(--blue);margin-top:14px;min-height:20px;font-weight:500}
.input-bottom{padding:28px 0 0}
.btn-primary{
  width:100%;height:56px;border:none;border-radius:14px;background:var(--blue);color:#fff;
  font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .15s,opacity .15s;
}
.btn-primary:disabled{background:var(--bg2);color:var(--text4);pointer-events:none}
.btn-primary:active{transform:scale(.95);transition:transform .1s cubic-bezier(.16,1,.3,1)}

/* RESULT */
.result-screen{position:relative;background:var(--bg)}
.result-fullscreen{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:20px var(--pad) 24px;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.result-top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 var(--pad);margin-bottom:8px;
  animation:fadeIn .4s ease-out .8s both;
}
.reset-btn{border:none;background:none;font-family:inherit;font-size:14px;font-weight:500;color:var(--text3);cursor:pointer;padding:8px 0}
.reset-btn:active{opacity:.4}
.settings-btn{border:none;background:none;cursor:pointer;padding:8px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.settings-btn:active{opacity:.4}
.settings-btn svg{width:22px;height:22px}
.result-label{font-size:15px;font-weight:500;color:var(--text3);animation:slideUp .5s ease-out both}
.result-amount{
  font-size:52px;font-weight:900;letter-spacing:-2px;color:var(--text);margin-top:8px;line-height:1.15;
  animation:countUp .7s cubic-bezier(.16,1,.3,1) .15s both;
}
.result-amount .unit{font-size:24px;font-weight:700;margin-left:2px}
.result-amount.negative{color:var(--red)}
.basis-btn{
  border:none;background:none;font-family:inherit;font-size:13px;font-weight:500;
  color:var(--text3);cursor:pointer;padding:8px 0;margin-top:8px;
  animation:slideUp .6s ease-out .4s both;
}
.basis-btn:active{opacity:.4}
.result-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;width:100%;animation:slideUp .6s ease-out .6s both}
.action-card{
  width:100%;background:var(--bg2);border:none;border-radius:14px;padding:18px 20px;
  font-family:inherit;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  transition:transform .15s;
}
.action-card:active{transform:scale(.98)}
.action-card-title{font-size:15px;font-weight:600;color:var(--text)}
.action-card-sub{font-size:13px;color:var(--text3);margin-top:2px}
.action-card-arrow{font-size:16px;color:var(--text4)}

/* PANELS */
.panel-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0);
  z-index:100;pointer-events:none;transition:background .35s;
}
.panel-overlay.show{background:rgba(0,0,0,.4);pointer-events:auto}
.bottom-panel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:440px;background:var(--bg);border-radius:20px 20px 0 0;
  z-index:101;max-height:90vh;overflow-y:auto;
  transition:transform .4s cubic-bezier(.16,1,.3,1);-webkit-overflow-scrolling:touch;
}
.bottom-panel.show{transform:translateX(-50%) translateY(0)}
.panel-handle-area{display:flex;justify-content:center;padding:12px 0 4px;cursor:pointer}
.panel-handle{width:36px;height:4px;border-radius:2px;background:var(--input-line)}
.panel-header{padding:8px var(--pad) 16px;display:flex;justify-content:space-between;align-items:center}
.panel-title{font-size:18px;font-weight:700}
.panel-close{
  width:36px;height:36px;border:none;background:var(--bg2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);
}
.panel-close:active{opacity:.5}
.panel-close svg{width:16px;height:16px}
.panel-content{padding:0 var(--pad) 40px}

/* TIPS PANEL */
#tipsPanel{background:var(--bg2)}
.tips-total{
  background:var(--blue-bg);border-radius:14px;padding:18px 20px;text-align:center;margin-bottom:16px;
}
.tips-total-label{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:4px}
.tips-total-value{font-size:22px;font-weight:800;color:var(--blue)}

.cat-card{
  background:var(--bg2);border-radius:14px;padding:18px 20px;margin-bottom:10px;cursor:pointer;
  transition:transform .2s cubic-bezier(.16,1,.3,1);
  animation:springIn .5s cubic-bezier(.16,1,.3,1) both;
}
.cat-card:nth-child(1){animation-delay:.1s}
.cat-card:nth-child(2){animation-delay:.18s}
.cat-card:nth-child(3){animation-delay:.26s}
.cat-card:nth-child(4){animation-delay:.34s}
.cat-card:nth-child(5){animation-delay:.42s}
.cat-card:active{transform:scale(.96)}
.cat-card-top{display:flex;justify-content:space-between;align-items:center}
.cat-card-name{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.cat-card-amt{font-size:13px;font-weight:600;color:var(--blue)}
.cat-card-arrow{color:var(--text4);font-size:14px}
.cat-card-progress{margin-top:10px}
.progress-bar-bg{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .7s cubic-bezier(.16,1,.3,1);min-width:0;animation:fillBar .7s cubic-bezier(.16,1,.3,1)}
.progress-bar-fill.full{background:var(--green)}
.progress-info{display:flex;justify-content:space-between;margin-top:6px}
.progress-label{font-size:12px;color:var(--text3)}
.progress-pct{font-size:12px;font-weight:600;color:var(--blue)}
.progress-pct.full{color:var(--green)}

/* CATEGORY DETAIL PANEL */
#catDetailPanel{background:var(--bg)}
.cat-detail-back{
  border:none;background:none;font-family:inherit;font-size:14px;font-weight:500;
  color:var(--text3);cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;
}
.cat-detail-back:active{opacity:.4}
.cat-input-group{margin-bottom:20px}
.cat-input-label{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:8px}
.cat-input-hint{font-size:12px;color:var(--text3);margin-bottom:8px}
.cat-input-wrap{position:relative}
.cat-input{
  width:100%;height:48px;border:1.5px solid var(--line);border-radius:12px;
  padding:0 50px 0 16px;font-size:16px;font-weight:600;color:var(--text);
  font-family:inherit;outline:none;background:var(--bg);transition:border-color .2s;
}
.cat-input:focus{border-color:var(--blue)}
.cat-input::placeholder{color:var(--text4);font-weight:400}
.cat-input-unit{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3)}

.cat-result-box{
  background:var(--blue-bg);border-radius:14px;padding:18px 20px;margin:20px 0;
}
.cat-result-label{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:4px}
.cat-result-value{font-size:20px;font-weight:800;color:var(--blue)}

.goal-section{margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
.goal-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.goal-input-wrap{display:flex;gap:8px;align-items:center}
.goal-input{
  flex:1;height:44px;border:1.5px solid var(--line);border-radius:12px;
  padding:0 16px;font-size:15px;font-weight:600;color:var(--text);
  font-family:inherit;outline:none;background:var(--bg);
}
.goal-input:focus{border-color:var(--blue)}
.goal-input::placeholder{color:var(--text4);font-weight:400}
.goal-unit{font-size:14px;color:var(--text3);white-space:nowrap}
.goal-msg{font-size:13px;color:var(--text3);margin-top:10px;line-height:1.5}
.goal-msg b{color:var(--blue);font-weight:700}
.goal-msg.done b{color:var(--green)}

.btn-save-cat{
  width:100%;height:52px;border:none;border-radius:14px;background:var(--blue);color:#fff;
  font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:24px;
}
.btn-save-cat:active{transform:scale(.97);opacity:.9}

/* FLOW UI */
.flow-title{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.4;white-space:pre-line}
.flow-sub{font-size:14px;color:var(--text3);margin-top:8px;margin-bottom:28px}
.flow-step{font-size:13px;font-weight:600;color:var(--text4);margin-bottom:16px}
.choice-btn{
  width:100%;height:56px;border:1.5px solid var(--line);border-radius:14px;
  background:var(--bg);font-size:16px;font-weight:600;color:var(--text);
  font-family:inherit;cursor:pointer;margin-bottom:10px;transition:all .15s;
  text-align:left;padding:0 20px;display:flex;align-items:center;
}
.choice-btn:active{transform:scale(.97);transition:transform .1s}
.choice-btn{transition:all .2s cubic-bezier(.16,1,.3,1)}
.choice-btn.selected{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.flow-info-box{background:var(--bg2);border-radius:14px;padding:20px;margin:24px 0}
.flow-info-text{font-size:14px;color:var(--text2);line-height:1.6}
.flow-edit-btn{
  width:100%;height:48px;border:1.5px solid var(--line);border-radius:14px;
  background:var(--bg);font-size:15px;font-weight:600;color:var(--text2);
  font-family:inherit;cursor:pointer;margin-top:10px;
}
.flow-edit-btn:active{transform:scale(.97);opacity:.8}
.summary-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.summary-item:last-child{border-bottom:none}
.summary-item-label{font-size:14px;color:var(--text2)}
.summary-item-value{font-size:14px;font-weight:600;color:var(--text)}

/* BADGE */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;margin-left:8px;vertical-align:middle}
.badge-me{background:var(--blue-bg);color:var(--blue)}
.badge-spouse{background:#FFF0F0;color:var(--red)}
.badge-plan{background:#FFF8E1;color:#F59F00}

/* ADVICE BOX */
.advice-box{background:var(--bg2);border-radius:12px;padding:14px 16px;margin:12px 0;font-size:13px;color:var(--text2);line-height:1.6}
.advice-box b{color:var(--blue);font-weight:700}

/* CARD THRESHOLD */
.threshold-section{margin:16px 0}
.threshold-label{font-size:13px;color:var(--text3);margin-bottom:6px}
.threshold-bar-bg{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.threshold-bar-fill{height:100%;border-radius:4px;background:var(--blue);transition:width .4s}
.threshold-bar-fill.over{background:var(--green)}
.threshold-info{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--text3)}
.threshold-info b{color:var(--blue);font-weight:700}
.threshold-alert{font-size:13px;color:var(--blue);font-weight:600;margin-top:8px}
.threshold-alert.done{color:var(--green)}

/* CARD LIMIT TRACKER */
.limit-tracker{margin:16px 0}
.limit-tracker-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px}
.limit-item{margin-bottom:14px}
.limit-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.limit-item-name{font-size:13px;font-weight:600;color:var(--text2)}
.limit-item-amount{font-size:13px;font-weight:700;color:var(--blue)}
.limit-item-amount.full{color:var(--green)}
.limit-bar-bg{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.limit-bar-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .6s cubic-bezier(.16,1,.3,1);animation:fillBar .6s cubic-bezier(.16,1,.3,1)}
.limit-bar-fill.full{background:var(--green)}
.limit-item-msg{font-size:12px;margin-top:4px}
.limit-item-msg.done{color:var(--green);font-weight:600}
.limit-item-msg.remain{color:var(--text3)}

/* CARD IMPORT */
.card-import-btn{
  width:100%;height:52px;border:1.5px solid var(--blue);border-radius:14px;
  background:var(--bg);font-size:15px;font-weight:600;color:var(--blue);
  font-family:inherit;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;
}
.card-import-btn:active{transform:scale(.97);opacity:.8;background:var(--blue-bg)}
.card-field-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.card-field-info{flex:1;min-width:0}
.card-field-name{font-size:14px;font-weight:600;color:var(--text)}
.card-field-rate{font-size:12px;color:var(--text3);margin-top:2px}
.card-field-input{width:120px;position:relative;flex-shrink:0}
.card-field-input .cat-input{text-align:right;padding-right:40px;height:42px;font-size:15px}
.card-field-input .cat-input-unit{font-size:13px}
.card-field-deduct{font-size:12px;color:var(--blue);font-weight:600;text-align:right;margin-top:2px;min-width:120px}

/* LOAN LINK */
.loan-link-btn{
  border:none;background:none;font-family:inherit;font-size:14px;font-weight:600;
  color:var(--blue);cursor:pointer;padding:12px 0;display:flex;align-items:center;gap:4px;
}
.loan-link-btn:active{opacity:.5}

/* SETTINGS */
.setting-group{margin-bottom:24px}
.setting-label{font-size:13px;font-weight:600;color:var(--text3);margin-bottom:10px}
.setting-input{
  width:100%;height:48px;border:1.5px solid var(--line);border-radius:12px;
  padding:0 16px;font-size:16px;font-weight:600;color:var(--text);
  font-family:inherit;outline:none;background:var(--bg);transition:border-color .2s;
}
.setting-input:focus{border-color:var(--blue)}
.setting-input::placeholder{color:var(--text4);font-weight:400}
.rate-btns{display:flex;gap:8px}
.rate-btn{
  flex:1;height:44px;border:1.5px solid var(--line);border-radius:12px;background:var(--bg);
  font-size:15px;font-weight:600;color:var(--text2);font-family:inherit;cursor:pointer;transition:all .15s;
}
.rate-btn.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.rate-btn:active{transform:scale(.96)}
.setting-hint{font-size:12px;color:var(--text3);margin-top:6px;line-height:1.5}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.toggle-desc{font-size:14px;color:var(--text2)}
.toggle-switch{position:relative;width:48px;height:28px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--line);border-radius:14px;transition:.3s}
.toggle-slider:before{content:'';position:absolute;height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle-switch input:checked+.toggle-slider{background:var(--blue)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(20px)}
.btn-save{
  width:100%;height:52px;border:none;border-radius:14px;background:var(--blue);color:#fff;
  font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px;
}
.btn-save:active{transform:scale(.97);opacity:.9}

/* DETAIL */
.detail-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
.detail-item:last-child{border-bottom:none}
.detail-item-label{font-size:15px;color:var(--text2)}
.detail-item-value{font-size:15px;font-weight:600;color:var(--text)}
.detail-section-title{font-size:13px;font-weight:700;color:var(--text3);padding:16px 0 4px;letter-spacing:.5px}
.detail-divider{height:8px;background:var(--bg2);margin:0 calc(-1 * var(--pad))}

/* TOAST */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:#fff;padding:12px 24px;border-radius:12px;
  font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:all .3s;
  z-index:200;max-width:360px;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- INPUT SCREEN -->
<div id="screen-input" class="screen active">
  <div class="input-screen">
    <div class="app-name">십삼월</div>
    <div class="step-bar">
      <div class="step-dots">
        <div class="step-num active">1</div>
        <div class="step-line"></div>
        <div class="step-num">2</div>
      </div>
      <div class="step-label">1단계 — 급여 입력</div>
    </div>
    <div class="input-top">
      <div class="input-title">올해 받을 급여가<br>얼마예요?</div>
      <div class="input-sub">세전 총급여 기준</div>
    </div>
    <div class="salary-section">
      <div class="salary-wrap">
        <input id="salaryInput" class="salary-input" type="tel" inputmode="numeric" placeholder="" autocomplete="off">
        <span class="salary-unit">만원</span>
      </div>
      <div id="salaryHint" class="salary-hint"></div>
    </div>
    <div class="input-bottom">
      <button id="calcBtn" class="btn-primary" disabled onclick="calculate()">환급액 확인하기</button>
    </div>

function earnedIncomeDeduction(tp) {
  if (tp <= 5000000) return tp * 0.7;
  if (tp <= 15000000) return 3500000 + (tp - 5000000) * 0.4;
  if (tp <= 45000000) return 7500000 + (tp - 15000000) * 0.15;
  if (tp <= 100000000) return 12000000 + (tp - 45000000) * 0.05;
  return 14750000 + (tp - 100000000) * 0.02;
}

function incomeTax(t) {
  if (t <= 0) return 0;
  if (t <= 14000000) return t * 0.06;
  if (t <= 50000000) return 840000 + (t - 14000000) * 0.15;
  if (t <= 88000000) return 6240000 + (t - 50000000) * 0.24;
  if (t <= 150000000) return 15360000 + (t - 88000000) * 0.35;
  if (t <= 300000000) return 37060000 + (t - 150000000) * 0.38;
  if (t <= 500000000) return 94060000 + (t - 300000000) * 0.40;
  if (t <= 1000000000) return 174060000 + (t - 500000000) * 0.42;
  return 384060000 + (t - 1000000000) * 0.45;
}

function marginalRate(t) {
  if (t <= 14000000) return 0.06;
  if (t <= 50000000) return 0.15;
  if (t <= 88000000) return 0.24;
  if (t <= 150000000) return 0.35;
  if (t <= 300000000) return 0.38;
  if (t <= 500000000) return 0.40;
  if (t <= 1000000000) return 0.42;
  return 0.45;
}

function earnedIncomeTaxCredit(computed, tp) {
  var c = computed <= 1300000 ? computed * 0.55 : 715000 + (computed - 1300000) * 0.30;
  var lim;
  if (tp <= 33000000) lim = 740000;
  else if (tp <= 70000000) lim = Math.max(740000 - (tp - 33000000) * 0.008, 660000);
  else if (tp <= 120000000) lim = Math.max(660000 - (tp - 70000000) * 0.5, 500000);
  else lim = Math.max(500000 - (tp - 120000000) * 0.5, 200000);
  return Math.min(c, lim);
}

function calcSocialInsForTax(tp) {
  var mp = tp / 12;
  var pb = Math.max(Math.min(mp, 6370000), 400000);
  var p = Math.round(pb * 0.0475) * 12;
  var h = Math.round(mp * 0.03595) * 12;
  var l = Math.round(Math.round(mp * 0.03595) * 0.1314) * 12;
  var e = Math.round(mp * 0.009) * 12;
  return p + h + l + e;
}

function lookupWithholding(pay) {
  var k = Math.floor(pay / 1000);
  if (k < 1060) return 0;

    if (k<=30000) return WT10+6610600+Math.round((k-28000)*1000*0.98*0.40);
    if (k<=45000) return WT10+7394600+Math.round((k-30000)*1000*0.40);
    if (k<=87000) return WT10+13394600+Math.round((k-45000)*1000*0.42);
    return WT10+31034600+Math.round((k-87000)*1000*0.45);
  }
  var lo=0,hi=WT.length-1;
  while(lo<=hi){var m=(lo+hi)>>1;if(WT[m][0]<=k)lo=m+1;else hi=m-1;}
  return WT[hi][1];
}

function calcSimpleRefund(sal, fam) {
  var annual = sal * 10000;
  if (annual <= 0) return {refund:0,withheld:0,finalTax:0,totalPay:0,taxable:0,computed:0,eid:0,personal:0,socialIns:0,specialDed:0,earnedCredit:0,standardCredit:0,incomeTaxFinal:0,localTax:0,monthlyWithheld:0,earnedIncome:0};
  var nonTax = nonTaxMeal ? 2400000 : 0;
  var tp = Math.max(annual - nonTax, 0);
  var eid = earnedIncomeDeduction(tp);
  var ei = tp - eid;
  var personal = fam * 1500000;
  var si = calcSocialInsForTax(tp);
  var sd = 0;
  if (fam <= 1) {
    if(tp<=30000000)sd=3100000+tp*0.04;
    else if(tp<=45000000)sd=3100000+tp*0.04-(tp-30000000)*0.05;
    else if(tp<=70000000)sd=3100000+tp*0.015;
    else if(tp<=120000000)sd=3100000+tp*0.005;
    else sd=3100000+120000000*0.005;
  } else if (fam === 2) {
    if(tp<=30000000)sd=3600000+tp*0.04;
    else if(tp<=45000000)sd=3600000+tp*0.04-(tp-30000000)*0.05;
    else if(tp<=70000000)sd=3600000+tp*0.02;
    else if(tp<=120000000)sd=3600000+tp*0.01;
    else sd=3600000+120000000*0.01;
  } else {
    if(tp<=30000000)sd=5000000+tp*0.07;
    else if(tp<=45000000)sd=5000000+tp*0.07-(tp-30000000)*0.05;
    else if(tp<=70000000)sd=5000000+tp*0.05;
    else if(tp<=120000000)sd=5000000+tp*0.03;
    else sd=5000000+120000000*0.03;
    if(tp>40000000)sd+=(tp-40000000)*0.04;
  }
  sd = Math.round(sd);
  var taxable = Math.max(ei - personal - si - sd, 0);
  var computed = incomeTax(taxable);
  var ec = earnedIncomeTaxCredit(computed, tp);
  var sc = 130000;
  var itf = Math.max(computed - ec - sc, 0);
  var lt = Math.round(itf * 0.1);
  var ft = itf + lt;
  var mp = Math.round(tp / 12);
  var mt = lookupWithholding(mp);
  var wl = mt + Math.round(mt * 0.1);
  var adj = Math.round(wl * (rate / 100));
  var wh = adj * 12;
  return {refund:wh-ft,withheld:wh,finalTax:ft,totalPay:tp,taxable:taxable,computed:computed,eid:eid,personal:personal,socialIns:si,specialDed:sd,earnedCredit:ec,standardCredit:sc,incomeTaxFinal:itf,localTax:lt,monthlyWithheld:adj,earnedIncome:ei};
}

// ===========================
function getTotalPay() {
  return lastResult ? lastResult.totalPay : Math.max(salary * 10000 - 2400000, 0);
}

function getMRate() {
  var tp = getTotalPay();
  var taxable = lastResult ? lastResult.taxable : 0;
  return marginalRate(taxable);
}

function calcCatSaving(catKey) {
  var tp = getTotalPay();
  var mr = getMRate();
  var ci = catInputs[catKey];

  if (catKey === 'card') {
    var threshold = tp * 0.25;
    var totalSpend = (ci.credit + ci.debit + ci.cash + ci.market + ci.transit) * 10000;
    if (totalSpend <= threshold) return 0;
    // 25% 초과분에서 카드 종류별 공제율 적용 (신용카드가 먼저 문턱에 소진)
    var usedFromCredit = Math.min(ci.credit * 10000, threshold);
    var remain = threshold - usedFromCredit;
    var usedFromDebit = Math.min(ci.debit * 10000, remain); remain -= usedFromDebit;
    var usedFromCash = Math.min(ci.cash * 10000, remain); remain -= usedFromCash;
    var usedFromMarket = Math.min(ci.market * 10000, remain); remain -= usedFromMarket;
    var usedFromTransit = Math.min(ci.transit * 10000, remain);
    var creditOver = ci.credit * 10000 - usedFromCredit;
    var debitOver = ci.debit * 10000 - usedFromDebit;
    var cashOver = ci.cash * 10000 - usedFromCash;
    var marketOver = ci.market * 10000 - usedFromMarket;
    var transitOver = ci.transit * 10000 - usedFromTransit;
    // 기본 한도
    var baseLimit = tp <= 70000000 ? 3000000 : (tp <= 120000000 ? 2500000 : 2000000);
    var baseDed = creditOver * 0.15 + debitOver * 0.30 + cashOver * 0.30;
    baseDed = Math.min(baseDed, baseLimit);
    // 전통시장·대중교통 추가 한도 각 300만원
    var marketDed = Math.min(marketOver * 0.40, 3000000);
    var transitDed = Math.min(transitOver * 0.40, 3000000);
    var deduction = baseDed + marketDed + transitDed;
    return Math.round(deduction * mr * 1.1);
  }

  if (catKey === 'housing') {
    var saving = 0;
    // 월세 세액공제 (총급여 7천만 이하)
    if (tp <= 70000000 && ci.rent > 0) {
      var rentAmt = Math.min(ci.rent * 12 * 10000, 7500000);
      var rentRate = tp <= 55000000 ? 0.17 : 0.15;
      saving += Math.round(rentAmt * rentRate);
    }
    // 주택청약 소득공제 (총급여 7천만 이하, 무주택)
    if (tp <= 70000000 && ci.subscription > 0) {
      var subAmt = Math.min(ci.subscription * 10000, 2400000);
      saving += Math.round(subAmt * 0.4 * mr * 1.1);
    }
    // 대출이자 소득공제
    if (ci.loanInterest > 0) {
      var loanAmt = Math.min(ci.loanInterest * 10000, 20000000);
      saving += Math.round(loanAmt * mr * 1.1);
    }
    return saving;
  }

  if (catKey === 'pension') {
    var saving = 0;
    var pensionRate = tp <= 55000000 ? 0.15 : 0.12;
    // 연금저축 + IRP 합산 900만원 한도
    var pensionTotal = Math.min((ci.pensionSaving + ci.irp) * 10000, 9000000);
    saving += Math.round(pensionTotal * pensionRate);
    // 보장성보험 100만원 한도, 12%
    if (ci.insurance > 0) {
      saving += Math.round(Math.min(ci.insurance * 10000, 1000000) * 0.12);
    }
    return saving;
  }

  if (catKey === 'living') {
    var saving = 0;
    // 교육비 15% 세액공제 (대학 900만원 한도)
    if (ci.education > 0) {
      saving += Math.round(Math.min(ci.education * 10000, 9000000) * 0.15);
    }
    // 의료비 15% 세액공제 (총급여 3% 초과분)
    if (ci.medical > 0) {
      var medExcess = Math.max(ci.medical * 10000 - tp * 0.03, 0);
      if (medExcess > 0) saving += Math.round(medExcess * 0.15);
    }
    return saving;
  }

  if (catKey === 'donation') {
    var saving = 0;
    // 고향사랑기부금: 10만원까지 전액, 초과분 15%
    if (ci.hometown > 0) {
      var ht = ci.hometown * 10000;
      saving += Math.min(ht, 100000);
      if (ht > 100000) saving += Math.round((Math.min(ht, 5000000) - 100000) * 0.15);
    }
    // 정치자금: 10만원까지 전액, 초과분 15%/25%
    if (ci.political > 0) {
      var pt = ci.political * 10000;
      saving += Math.min(pt, 100000);
      if (pt > 100000) saving += Math.round((pt - 100000) * 0.15);
    }
    // 종교기부금: 15%
    if (ci.religious > 0) {
      saving += Math.round(ci.religious * 10000 * 0.15);
    }
    // 일반기부금: 1천만원까지 15%, 초과 30%
    if (ci.general > 0) {
      var ga = ci.general * 10000;
      if (ga <= 10000000) saving += Math.round(ga * 0.15);
      else saving += 1500000 + Math.round((ga - 10000000) * 0.30);
    }
    return saving;
  }
  return 0;
}

function calcAllCatSavings() {
  var total = 0;
  ['card','housing','pension','living','donation'].forEach(function(k) { total += calcCatSaving(k); });
  return total;
}

function getSpouseTP() {
  if (spouseSalary <= 0) return 0;
  return Math.max(spouseSalary * 10000 - 2400000, 0);
}

function getSpouseTaxable() {
  var tp = getSpouseTP();
  if (tp <= 0) return 0;
  var eid = earnedIncomeDeduction(tp);
  var si = calcSocialInsForTax(tp);
  // 부양가족 1명 기준 특별소득공제
  var sd = 0;
  if(tp<=30000000)sd=3100000+tp*0.04;
  else if(tp<=45000000)sd=3100000+tp*0.04-(tp-30000000)*0.05;
  else if(tp<=70000000)sd=3100000+tp*0.015;
  else if(tp<=120000000)sd=3100000+tp*0.005;
  else sd=3100000+120000000*0.005;
  return Math.max(tp - eid - 1500000 - si - Math.round(sd), 0);
}

function getSpouseMR() { return marginalRate(getSpouseTaxable()); }

// 가족 유불리 판단
function getFamilyAdvice(catKey) {

  if (catKey === 'card') {

    if (spPR > myPR) return { who: 'spouse', reason: '배우자가 더 많이 돌려받아요' };
    // 공제율 같으면 세율 높은 쪽

    return { who: 'spouse', reason: '배우자 명의로 기부하면 더 많이 돌려받아요' };

  return null;
}

// 카드 문턱 분석
function getCardThresholdInfo() {
  var tp = getTotalPay();
  var ci = catInputs.card;
  var totalSpend = (ci.credit + ci.debit + ci.cash + ci.market + ci.transit) * 10000;
  var threshold = tp * 0.25;
  var baseLimit = tp <= 70000000 ? 3000000 : (tp <= 120000000 ? 2500000 : 2000000);

  // 기본 공제액 (신용/체크/현금)
  var baseDed = 0;
  if (totalSpend > threshold) {
    var usedFromCredit = Math.min(ci.credit * 10000, threshold);
    var remain = threshold - usedFromCredit;
    var usedFromDebit = Math.min(ci.debit * 10000, remain); remain -= usedFromDebit;
    var usedFromCash = Math.min(ci.cash * 10000, remain); remain -= usedFromCash;
    var usedFromMarket = Math.min(ci.market * 10000, remain); remain -= usedFromMarket;
    var usedFromTransit = Math.min(ci.transit * 10000, remain);
    baseDed = (ci.credit*10000-usedFromCredit)*0.15 + (ci.debit*10000-usedFromDebit)*0.30 + (ci.cash*10000-usedFromCash)*0.30;
    baseDed = Math.min(baseDed, baseLimit);
  }
  var marketDed = Math.min(Math.max((ci.market * 10000) - (totalSpend > threshold ? 0 : 0), 0) * 0.40, 3000000);
  var transitDed = Math.min(Math.max(ci.transit * 10000, 0) * 0.40, 3000000);
  var totalDed = baseDed + (totalSpend > threshold ? marketDed + transitDed : 0);
  var totalLimit = baseLimit + 3000000 + 3000000; // 기본 + 전통시장 + 대중교통

  // 카드별 공제 가능액
  var perCard = {};
  CAT_META.card.fields.forEach(function(f) {
    var amt = ci[f.key] * 10000;
    perCard[f.key] = { amount: amt, rate: f.rate, deductible: Math.round(amt * f.rate) };
  });

  return {
    totalSpend: totalSpend,
    threshold: threshold,
    thresholdPct: threshold > 0 ? Math.min(Math.round(totalSpend / threshold * 100), 100) : 0,
    overThreshold: totalSpend > threshold,
    deduction: totalDed,
    baseLimit: baseLimit,
    baseDed: baseDed,
    marketDed: totalSpend > threshold ? marketDed : 0,
    marketLimit: 3000000,
    transitDed: totalSpend > threshold ? transitDed : 0,
    transitLimit: 3000000,
    totalLimit: totalLimit,
    limitPct: baseLimit > 0 ? Math.min(Math.round(baseDed / baseLimit * 100), 100) : 0,
    limitReached: baseDed >= baseLimit,
    perCard: perCard
  };
}

// ===========================

// ===========================
function animateCountUp(el, targetVal, suffix, duration) {
  suffix = suffix || '원';
  duration = duration || 600;
  var start = 0, startTime = null;
  function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }
  function step(ts) {
    if (!startTime) startTime = ts;
    var progress = Math.min((ts - startTime) / duration, 1);
    var val = Math.round(easeOutExpo(progress) * targetVal);
    el.textContent = fmtAmt(val) + suffix;
    if (progress < 1) requestAnimationFrame(step);
  }
  if (targetVal === 0) { el.textContent = '0' + suffix; return; }
  requestAnimationFrame(step);
}

// CATEGORY DETAIL - FLOW SYSTEM
// ===========================
var catFlow = { cat: null, step: 0, answers: {}, history: [] };

function openCatDetail(key) {
  currentCat = key;
  var ans = prefillCatAnswers(key);
  var hasData = calcCatSaving(key) > 0;
  catFlow = { cat: key, step: 0, answers: ans, history: [] };
  if (hasData) { var steps = getCatSteps(key, ans); catFlow.step = steps.length - 1; }
  renderCatStep();
  openPanel('catDetailPanel');
}

function prefillCatAnswers(key) {
  var ci = catInputs[key]; var a = {};
  if (key === 'housing') {
    if (ci.rent > 0) { a.hasHouse = 'none'; a.livingType = 'rent'; a.hasSubscription = ci.subscription > 0 ? 'yes' : 'no'; }
    else if (ci.loanInterest > 0 && !ci.subscription) { a.hasHouse = 'one'; a.hasLoan = 'yes'; }
    else if (ci.subscription > 0) { a.hasHouse = 'none'; a.livingType = 'other'; a.hasSubscription = 'yes'; }
  }
  if (key === 'pension') { a.hasPension = (ci.pensionSaving > 0 || ci.irp > 0) ? 'yes' : 'no'; a.hasInsurance = ci.insurance > 0 ? 'yes' : 'no'; }
  if (key === 'living') { a.hasEducation = ci.education > 0 ? 'yes' : 'no'; a.hasMedical = ci.medical > 0 ? 'yes' : 'no'; }
  if (key === 'donation') {
    var types = [];
    if (ci.hometown > 0) types.push('hometown'); if (ci.political > 0) types.push('political');
    if (ci.religious > 0) types.push('religious'); if (ci.general > 0) types.push('general');
    a.hasDonation = types.length > 0 ? 'yes' : 'no'; if (types.length > 0) a.donTypes = types;
  }
  return a;
}

function renderCatStep() {
  var steps = getCatSteps(catFlow.cat, catFlow.answers);
  if (catFlow.step >= steps.length) catFlow.step = steps.length - 1;
  var st = steps[catFlow.step];
  if (st.type === 'done') { renderCatSummary(); return; }
  var h = '<div class="flow-step">' + CAT_META[catFlow.cat].name + '</div>';
  h += '<div class="flow-title">' + st.title + '</div>';
  if (st.sub) h += '<div class="flow-sub">' + st.sub + '</div>';
  if (st.type === 'choice') {
    st.options.forEach(function(opt) {
      var sel = catFlow.answers[st.key] === opt.value;
      h += '<button class="choice-btn' + (sel ? ' selected' : '') + '" onclick="onFlowChoice(\'' + st.key + '\',\'' + opt.value + '\')">' + opt.label + '</button>';
    });
  }
  if (st.type === 'multi') {
    var selected = catFlow.answers[st.key] || [];
    st.options.forEach(function(opt) {
      var isSel = selected.indexOf(opt.value) >= 0;
      h += '<button class="choice-btn' + (isSel ? ' selected' : '') + '" onclick="onFlowMulti(\'' + st.key + '\',\'' + opt.value + '\')">' + opt.label + '</button>';
    });
    if (selected.length > 0) h += '<button class="btn-save-cat" style="margin-top:16px" onclick="nextFlowStep()">다음</button>';
  }
  if (st.type === 'input') {
    var ci = catInputs[catFlow.cat];
    st.fields.forEach(function(f) {
      var val = ci[f.key] || 0;
      h += '<div class="cat-input-group"><div class="cat-input-label">' + f.label + '</div>';
      h += '<div class="cat-input-wrap"><input class="cat-input" type="tel" inputmode="numeric" data-field="' + f.key + '" value="' + (val > 0 ? val.toLocaleString() : '') + '" placeholder="0" oninput="onCatInput(this)">';
      h += '<span class="cat-input-unit">' + (f.unit || '만원') + '</span></div></div>';
    });
    if (st.extra === 'cardThreshold') h += '<div id="cardThresholdArea">' + renderCardThresholdHTML() + '</div>';
    if (st.extra === 'medicalAdvice' && hasSpouse()) {
      var myTP = getTotalPay(), spTP = getSpouseTP();
      var ln = myTP <= spTP ? '본인' : '배우자', lt = Math.min(myTP, spTP) * 0.03;
      h += '<div class="advice-box"><b>의료비는 가족 것을 한 사람에게 몰아서 돌려받을 수 있어요.</b><br>';
      h += '소득이 낮은 <b>' + ln + '</b> 명의로 몰면 기준(' + fmtAmt(lt) + '원)을 빨리 넘어서 더 많이 돌려받아요.<br>';
      h += '부부, 자녀, 부모님 의료비 모두 한쪽으로 몰아서 돌려받을 수 있어요.</div>';
    }
    var saving = calcCatSaving(catFlow.cat);
    h += '<div class="cat-result-box"><div class="cat-result-label">돌려받는 금액</div>';
    h += '<div class="cat-result-value" id="catSavingDisplay">' + fmtAmt(saving) + '원</div></div>';
    h += '<button class="btn-save-cat" onclick="nextFlowStep()">다음</button>';
  }
  if (st.type === 'cardInput') {
    // 카드 사용 내역 불러오기 버튼
    h += '<button class="card-import-btn" onclick="showToast(\'간편인증 연동 후 자동으로 불러올 수 있어요\')">간편인증 불러오기</button>';
    var ci = catInputs.card, ti = getCardThresholdInfo();
    // 카드별 입력 필드
    CAT_META.card.fields.forEach(function(f) {
      var val = ci[f.key] || 0;
      var ded = ti.perCard[f.key];
      h += '<div class="card-field-row">';
      h += '<div class="card-field-info"><div class="card-field-name">' + f.label + '</div></div>';
      h += '<div class="card-field-input"><div class="cat-input-wrap"><input class="cat-input" type="tel" inputmode="numeric" data-field="' + f.key + '" value="' + (val > 0 ? val.toLocaleString() : '') + '" placeholder="0" oninput="onCatInput(this)"><span class="cat-input-unit">만원</span></div>';
      if (val > 0 && ti.overThreshold) h += '<div class="card-field-deduct">' + fmtAmt(ded.deductible) + '원 돌려받아요</div>';
      h += '</div></div>';
    });
    // 문턱 + 한도
    h += '<div id="cardThresholdArea">' + renderCardThresholdHTML() + '</div>';
    var saving = calcCatSaving('card');
    h += '<div class="cat-result-box"><div class="cat-result-label">돌려받는 금액</div>';
    h += '<div class="cat-result-value" id="catSavingDisplay">' + fmtAmt(saving) + '원</div></div>';
    h += '<button class="btn-save-cat" onclick="nextFlowStep()">다음</button>';
  }
  if (st.type === 'info') {
    h += '<div class="flow-info-box"><div class="flow-info-text">' + st.msg + '</div></div>';
    h += '<button class="btn-save-cat" onclick="nextFlowStep()">확인</button>';
  }
  document.getElementById('catDetailContent').innerHTML = h;
}

function renderCardThresholdHTML() {
  var ti = getCardThresholdInfo();
  var h = '<div class="threshold-section"><div class="threshold-label">얼마나 써야 돌려받나요?</div>';
  h += '<div class="threshold-bar-bg"><div class="threshold-bar-fill' + (ti.overThreshold ? ' over' : '') + '" style="width:' + ti.thresholdPct + '%"></div></div>';
  h += '<div class="threshold-info"><span>총 사용액 ' + fmtAmt(ti.totalSpend) + '원</span><span>기준 <b>' + fmtAmt(ti.threshold) + '원</b></span></div>';
  if (ti.overThreshold) {
    h += '<div class="threshold-alert done">기준을 넘었어요! 돌려받기 시작해요</div>';
  } else if (ti.totalSpend > 0) {
    var gap = ti.threshold - ti.totalSpend;
    // 문턱 넘었을 때 예상 환급액 계산 (체크카드 기준 30%)
    var potentialSaving = Math.round(gap * 0.30);
    h += '<div class="threshold-alert">지금은 0원이지만 <b>' + fmtAmt(gap) + '원</b> 더 쓰면 <b>' + fmtAmt(potentialSaving) + '원</b> 돌려받아요</div>';
  }
  h += '</div>';
  // 3개 한도 트래커
  if (ti.overThreshold) {
    h += '<div class="limit-tracker"><div class="limit-tracker-title">한도별 현황</div>';
    h += renderLimitItem('신용·체크·현금', ti.baseDed, ti.baseLimit);
    h += renderLimitItem('전통시장 추가', ti.marketDed, ti.marketLimit);
    h += renderLimitItem('대중교통 추가', ti.transitDed, ti.transitLimit);
    h += '</div>';
  }
  return h;
}

function renderLimitItem(name, ded, limit) {
  var pct = limit > 0 ? Math.min(Math.round(ded / limit * 100), 100) : 0;
  var isFull = pct >= 100;
  var remain = Math.max(limit - ded, 0);
  var h = '<div class="limit-item"><div class="limit-item-header">';
  h += '<span class="limit-item-name">' + name + '</span>';
  h += '<span class="limit-item-amount' + (isFull ? ' full' : '') + '">' + fmtAmt(ded) + '원 / ' + fmtAmt(limit) + '원</span></div>';
  h += '<div class="limit-bar-bg"><div class="limit-bar-fill' + (isFull ? ' full' : '') + '" style="width:' + pct + '%"></div></div>';
  if (isFull) h += '<div class="limit-item-msg done">한도 달성 ✓</div>';
  else if (ded > 0) h += '<div class="limit-item-msg remain">' + fmtAmt(remain) + '원 남았어요</div>';
  h += '</div>';
  return h;
}

function renderCatSummary() {
  var key = catFlow.cat, meta = CAT_META[key], saving = calcCatSaving(key), maxSaving = getMaxCatSaving(key);
  var h = '<div class="flow-step">' + meta.name + ' 결과</div>';
  // 시뮬레이션 뱃지
  var isPlan = Object.keys(catFlow.answers).some(function(k) { return catFlow.answers[k] === 'plan'; });
  if (isPlan) h += '<div style="margin-bottom:12px"><span class="badge badge-plan">시뮬레이션</span> 예정 금액 기준 예상 결과예요</div>';
  var advice = getFamilyAdvice(key);
  if (advice) {
    h += '<div class="advice-box"><span class="badge ' + (advice.who === 'me' ? 'badge-me' : 'badge-spouse') + '">';
    h += (advice.who === 'me' ? '본인이 유리' : '배우자가 유리') + '</span> ' + advice.reason + '</div>';
  }
  h += '<div class="cat-result-box"><div class="cat-result-label">돌려받는 금액</div>';
  h += '<div class="cat-result-value">' + fmtAmt(saving) + '원</div></div>';
  if (maxSaving > 0) {
    var pct = Math.min(Math.round(saving / maxSaving * 100), 100), isFull = pct >= 100;
    if (saving < maxSaving) h += '<div style="font-size:13px;color:var(--text3);margin-top:-8px;margin-bottom:12px">최대 ' + fmtAmt(maxSaving) + '원까지 가능해요</div>';
    h += '<div class="cat-card-progress" style="margin:0 0 16px"><div class="progress-bar-bg"><div class="progress-bar-fill' + (isFull ? ' full' : '') + '" style="width:' + pct + '%"></div></div>';
    h += '<div class="progress-info"><span class="progress-label">최대 가능 금액 대비</span><span class="progress-pct' + (isFull ? ' full' : '') + '">' + pct + '%</span></div></div>';
  }
  var ci = catInputs[key], hasAny = false;
  meta.fields.forEach(function(f) { if (ci[f.key] > 0) hasAny = true; });
  if (hasAny) {
    h += '<div style="margin:16px 0">';
    meta.fields.forEach(function(f) { if (ci[f.key] > 0) h += '<div class="summary-item"><span class="summary-item-label">' + f.label + '</span><span class="summary-item-value">' + ci[f.key].toLocaleString() + '만원</span></div>'; });
    h += '</div>';
  }
  if (key === 'housing' && (catFlow.answers.hasLoan === 'yes' || catFlow.answers.livingType === 'jeonse')) {
    h += '<div style="text-align:center;margin:8px 0"><button class="loan-link-btn" onclick="showToast(\'토스에서 대출 금리 비교가 가능해요\')">더 낮은 금리 확인하기 →</button></div>';
  }
  h += '<button class="btn-save-cat" onclick="saveCatAndReturn()">저장</button>';
  h += '<button class="flow-edit-btn" onclick="editCatFlow()">다시 입력하기</button>';
  document.getElementById('catDetailContent').innerHTML = h;
}

function getMaxCatSaving(key) {
  var tp = getTotalPay(), mr = getMRate();
  if (key === 'card') { var bl = tp <= 70000000 ? 3000000 : (tp <= 120000000 ? 2500000 : 2000000); return Math.round((bl + 3000000 + 3000000) * mr * 1.1); }
  if (key === 'housing') { var m = 0; if (tp <= 70000000) m += Math.round(7500000 * 0.17); if (tp <= 70000000) m += Math.round(2400000 * 0.4 * mr * 1.1); m += Math.round(20000000 * mr * 1.1); return m; }
  if (key === 'pension') { var pr = tp <= 55000000 ? 0.15 : 0.12; return Math.round(9000000 * pr + 1000000 * 0.12); }
  if (key === 'living') return Math.round(9000000 * 0.15 + 7000000 * 0.15);
  if (key === 'donation') return Math.round(5000000 * 0.15 + 100000);
  return 0;
}

function onFlowChoice(key, value) {
  catFlow.history.push({ step: catFlow.step, answers: JSON.parse(JSON.stringify(catFlow.answers)) });
  catFlow.answers[key] = value;
  var ci = catInputs[catFlow.cat];
  if (key === 'hasHouse') { ci.rent = 0; ci.subscription = 0; ci.loanInterest = 0; delete catFlow.answers.livingType; delete catFlow.answers.hasSubscription; delete catFlow.answers.hasLoan; }
  if (key === 'livingType') { ci.rent = 0; ci.loanInterest = 0; }
  if (value === 'no') {
    if (key === 'hasPension') { ci.pensionSaving = 0; ci.irp = 0; } if (key === 'hasInsurance') ci.insurance = 0;
    if (key === 'hasEducation') ci.education = 0; if (key === 'hasMedical') ci.medical = 0;
    if (key === 'hasDonation') { ci.hometown = 0; ci.political = 0; ci.religious = 0; ci.general = 0; }
    if (key === 'hasSubscription') ci.subscription = 0; if (key === 'hasLoan') ci.loanInterest = 0;
  }
  catFlow.step++; renderCatStep();
}

function onFlowMulti(key, value) {
  var arr = catFlow.answers[key] || []; var idx = arr.indexOf(value);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(value);
  catFlow.answers[key] = arr;
  if (key === 'donTypes') { var ci = catInputs.donation; ['hometown','political','religious','general'].forEach(function(t) { if (arr.indexOf(t) < 0) ci[t] = 0; }); }
  renderCatStep();
}

function nextFlowStep() {
  catFlow.history.push({ step: catFlow.step, answers: JSON.parse(JSON.stringify(catFlow.answers)) });
  catFlow.step++; renderCatStep();
}

function prevFlowStep() {
  if (catFlow.history.length > 0) { var prev = catFlow.history.pop(); catFlow.step = prev.step; catFlow.answers = prev.answers; renderCatStep(); }
  else backToTips();
}

function editCatFlow() { catFlow.step = 0; catFlow.history = []; renderCatStep(); }

function saveCatAndReturn() { saveToLocal(); backToTips(); showToast('저장했어요'); }

function onCatInput(el) {
  var v = el.value.replace(/[^0-9]/g, '');
  if (v.length > 6) v = v.slice(0, 6);
  el.value = v ? Number(v).toLocaleString() : '';
  var field = el.getAttribute('data-field');
  catInputs[currentCat][field] = Number(v) || 0;
  var saving = calcCatSaving(currentCat);
  var display = document.getElementById('catSavingDisplay');
  if (display) display.textContent = fmtAmt(saving) + '원';
  if (currentCat === 'card') {
    var thArea = document.getElementById('cardThresholdArea');
    if (thArea) thArea.innerHTML = renderCardThresholdHTML();
    // 카드별 공제액 업데이트
    var ti = getCardThresholdInfo();
    document.querySelectorAll('.card-field-deduct').forEach(function(d) { d.remove(); });
    if (ti.overThreshold) {
      document.querySelectorAll('.card-field-input').forEach(function(wrap) {
        var inp = wrap.querySelector('.cat-input');
        if (!inp) return;
        var fk = inp.getAttribute('data-field');
        var pc = ti.perCard[fk];
        if (pc && catInputs.card[fk] > 0) {
          var d = document.createElement('div'); d.className = 'card-field-deduct';
          d.textContent = fmtAmt(pc.deductible) + '원 돌려받아요';
          wrap.appendChild(d);
        }
      });
    }
  }
}


function backToTips() {
  closeAllPanels();
  renderTipsPanel();
  currentCat = null;
  showScreen('result');
}

// ===========================
// PANELS
// ===========================
function openPanel(id) {
  closeAllPanels();
  document.getElementById('panelOverlay').classList.add('show');
  document.getElementById(id).classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeAllPanels() {
  document.getElementById('panelOverlay').classList.remove('show');
  ['settingsPanel','detailPanel','catDetailPanel'].forEach(function(id) {
    document.getElementById(id).classList.remove('show');
  });
  document.body.style.overflow = '';
  currentCat = null;
}

function openSettings() {
  document.getElementById('setSalary').value = salary > 0 ? salary.toLocaleString() : '';
  document.getElementById('setSpouseSalary').value = spouseSalary > 0 ? spouseSalary.toLocaleString() : '';
  document.querySelectorAll('#setRateGroup .rate-btn').forEach(function(btn) {
    btn.classList.toggle('active', parseInt(btn.getAttribute('data-rate')) === rate);
  });
  document.getElementById('setNonTaxMeal').checked = nonTaxMeal;
  openPanel('settingsPanel');
}
function openDetail() { openPanel('detailPanel'); }

// ===========================
// SETTINGS
// ===========================
function setRateBtn(r) {
  rate = r;
  document.querySelectorAll('#setRateGroup .rate-btn').forEach(function(btn) {
    btn.classList.toggle('active', parseInt(btn.getAttribute('data-rate')) === r);
  });
}

function saveSettings() {
  var sv = document.getElementById('setSalary').value.replace(/[^0-9]/g, '');
  if (sv && Number(sv) >= 100) {
    salary = Number(sv);
    salaryInput.value = salary.toLocaleString();
  }
  var ssv = document.getElementById('setSpouseSalary').value.replace(/[^0-9]/g, '');
  spouseSalary = ssv ? Number(ssv) : 0;
  nonTaxMeal = document.getElementById('setNonTaxMeal').checked;
  closeAllPanels();
  recalculate();
  saveToLocal();
  showToast('설정이 저장되었어요');
}

document.getElementById('setSalary').addEventListener('input', function() {
  var v = this.value.replace(/[^0-9]/g, '');
  if (v.length > 6) v = v.slice(0, 6);
  this.value = v ? Number(v).toLocaleString() : '';
});

document.getElementById('setSpouseSalary').addEventListener('input', function() {
  var v = this.value.replace(/[^0-9]/g, '');
  if (v.length > 6) v = v.slice(0, 6);
  this.value = v ? Number(v).toLocaleString() : '';
});

// ===========================
// TOUCH DRAG
// ===========================
['tipsPanel','settingsPanel','detailPanel','catDetailPanel'].forEach(function(pid) {
  var p = document.getElementById(pid);
  var sy=0,cy=0,dr=false;
  p.addEventListener('touchstart', function(e) { if(p.scrollTop<=0){sy=e.touches[0].clientY;dr=true;} });
  p.addEventListener('touchmove', function(e) {
    if(!dr) return;
    cy=e.touches[0].clientY-sy;
    if(cy>0){p.style.transform='translateX(-50%) translateY('+cy+'px)';e.preventDefault();}
  }, {passive:false});
  p.addEventListener('touchend', function() {
    if(!dr) return; dr=false;
    if(cy>100) closeAllPanels();
    p.style.transform=''; cy=0;
  });
});

// ===========================
// LOCALSTORAGE
// ===========================
function saveToLocal() {
  try {
    localStorage.setItem('sipsamwol_data', JSON.stringify({
      salary: salary, rate: rate, spouseSalary: spouseSalary, nonTaxMeal: nonTaxMeal, catInputs: catInputs, catGoals: catGoals
    }));
  } catch(e) {}
}

function loadFromLocal() {
  try {
    var raw = localStorage.getItem('sipsamwol_data');
    if (!raw) return false;
    var d = JSON.parse(raw);
    if (!d || !d.salary || d.salary <= 0) return false;
    salary = d.salary;
    if (d.rate) rate = d.rate;
    if (d.spouseSalary) spouseSalary = d.spouseSalary;
    if (d.nonTaxMeal !== undefined) nonTaxMeal = d.nonTaxMeal;
    if (d.catInputs) {
      for (var k in d.catInputs) {
        if (catInputs[k]) {
          for (var f in d.catInputs[k]) {
            if (catInputs[k].hasOwnProperty(f)) catInputs[k][f] = d.catInputs[k][f] || 0;
          }
        }
      }
    }
    if (d.catGoals) {
      for (var k in d.catGoals) {
        if (catGoals.hasOwnProperty(k)) catGoals[k] = d.catGoals[k] || 0;
      }
    }
    return true;
  } catch(e) { return false; }
}

// ===========================
// TOAST
// ===========================
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2000);
}

// ===========================
// INIT
// ===========================
(function() {
  salaryInput.focus();
})();
</script>
